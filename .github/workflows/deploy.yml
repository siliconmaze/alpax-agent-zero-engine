name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile.dashboard
          push: true
          tags: |
            siliconmaze/alpax-agent-zero-dashboard:latest
            siliconmaze/alpax-agent-zero-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.SSH_HOST }} << 'ENDSSH'
            set -e
            cd /opt/alpax-agent-zero-engine
            git pull origin main
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
          ENDSSH

      - name: Health check
        run: |
          sleep 10
          curl -sf ${{ secrets.DEPLOY_DOMAIN }}/api/health \
            || { echo "Health check failed"; exit 1; }

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚨 Deploy failed for alpax-agent-zero-engine (${{ github.sha }})",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Deploy Failed*\n• Commit: `${{ github.sha }}`\n• Actor: ${{ github.actor }}"
                }
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
