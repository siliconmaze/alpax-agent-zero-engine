name: alpax-agent-zero-engine
services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: alpax-agent-zero-dashboard
    restart: unless-stopped
    ports:
      - "4001:4001"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - alpax-agent-net

  agent-zero:
    image: agentzero/agent-zero:latest
    container_name: alpax-agent-zero-core
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - A0_API_PORT=5000
      - A0_API_KEY=${AGENT_ZERO_API_KEY:-}
    volumes:
      - agent-zero-data:/home/a0/data
      - agent-zero-tools:/home/a0/.config/agent-zero/tools
    networks:
      - alpax-agent-net

  redis:
    image: redis:7-alpine
    container_name: alpax-agent-zero-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - alpax-agent-net

  postgres:
    image: postgres:16-alpine
    container_name: alpax-agent-zero-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=agentzero
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - alpax-agent-net

volumes:
  agent-zero-data:
  agent-zero-tools:
  redis-data:
  postgres-data:

networks:
  alpax-agent-net:
    driver: bridge
